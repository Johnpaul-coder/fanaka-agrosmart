
<!DOCTYPE html>
<html>
<head>
  <title>Farmers</title>
</head>
<body>
  <h1>Farmers</h1>
  <form id="addFarmerForm">
    <input type="text" name="name" placeholder="Name" required>
    <input type="text" name="location" placeholder="Location" required>
    <button type="submit">Add Farmer</button>
  </form>
  <ul id="farmersList"></ul>

  <script>
    const form = document.getElementById('addFarmerForm');
    const list = document.getElementById('farmersList');

    async function loadFarmers() {
      const res = await fetch('http://localhost:3000/farmers');
      const data = await res.json();
      list.innerHTML = '';
      data.forEach(f => {
        const li = document.createElement('li');
        li.textContent = `${f.name} (${f.location})`;
        list.appendChild(li);
      });
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const formData = new FormData(form);
      await fetch('http://localhost:3000/farmers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: formData.get('name'),
          location: formData.get('location')
        })
      });
      form.reset();
      loadFarmers();
    });

    loadFarmers();
  </script>
</body>
</html>
